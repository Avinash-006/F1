name: Build Unsigned iOS IPA

on:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm install

      # ✅ Install Expo CLI (modern way)
      - name: ⚡ Setup Expo
        run: npx expo --version

      # ✅ Generate iOS project
      - name: 📱 Prebuild iOS
        run: |
          npx expo prebuild --platform ios --no-install

      # ✅ Install CocoaPods
      - name: 📦 Install Pods
        run: |
          cd ios
          pod install
          cd ..

      # 🔍 Detect scheme automatically
      - name: 🔍 Detect Xcode Scheme
        id: scheme
        run: |
          SCHEME=$(ls ios | grep .xcodeproj | sed 's/.xcodeproj//')
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      # 🏗️ Build archive (Expo handles bundling internally)
      - name: 🏗️ Build Archive
        run: |
          xcodebuild \
            -workspace ios/*.xcworkspace \
            -scheme ${{ steps.scheme.outputs.scheme }} \
            -configuration Release \
            -archivePath ios/build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      # 📝 Create exportOptions.plist
      - name: 📝 Create exportOptions.plist
        run: |
          cat <<EOF > ios/exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
          </dict>
          </plist>
          EOF

      # 📦 Export IPA
      - name: 📦 Export IPA
        run: |
          mkdir -p ios/build/ipa
          xcodebuild -exportArchive \
            -archivePath ios/build/App.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath ios/build/ipa \
            CODE_SIGNING_ALLOWED=NO

      # 📤 Upload IPA
      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: ios/build/ipa/*.ipa
